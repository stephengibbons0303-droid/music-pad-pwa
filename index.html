<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2196F3">
    <title>MusicPad</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.5/build/cjs/vexflow.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        /* --- GLOBAL --- */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Nunito', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #4BA3F5; }
        button { cursor: pointer; border: none; font-family: 'Nunito', sans-serif; font-weight: 700; -webkit-tap-highlight-color: transparent; }
        .hidden { display: none !important; }

        /* --- HEADER BAR --- */
        #header-bar {
            flex: 0 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 20px;
            background: linear-gradient(180deg, #42A5F5, #2196F3);
        }
        #header-left { display: flex; align-items: center; gap: 12px; }
        #header-icon {
            width: 40px; height: 40px; background: white; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        #header-text h1 { font-size: 22px; font-weight: 900; color: white; line-height: 1.1; }
        #header-text span { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: 600; }

        #header-actions { display: flex; gap: 10px; align-items: center; }
        .hdr-btn {
            height: 42px; border-radius: 21px; font-size: 14px; font-weight: 800;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            padding: 0 16px; color: white;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }
        #btn-songs { background: linear-gradient(135deg, #AB47BC, #7E57C2); }
        #btn-play-header { background: linear-gradient(135deg, #EC407A, #E91E63); width: 48px; height: 48px; border-radius: 50%; padding: 0; font-size: 22px; }
        #btn-new { background: rgba(255,255,255,0.2); width: 42px; padding: 0; font-size: 24px; }

        /* --- NOTATION CARD --- */
        #notation-area {
            flex: 1 1 auto;
            display: flex; flex-direction: column;
            margin: 10px 16px 8px 16px;
            background: white; border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            overflow: hidden; min-height: 0;
        }
        #vexflow-canvas {
            flex-grow: 1; width: 100%;
            display: flex; justify-content: center; align-items: center;
            overflow-x: auto; overflow-y: hidden;
            padding: 2px 0;
        }
        #notepad-strip {
            flex: 0 0 auto; padding: 5px 16px;
            background: #F8FAFC; border-top: 1px solid #EEF2F6;
            font-size: 13px; color: #90A4AE; letter-spacing: 1px;
            text-align: center; white-space: nowrap; overflow-x: auto;
        }

        /* --- RADIAL MENU --- */
        #radial-menu {
            position: fixed; width: 260px; height: 260px;
            transform: translate(-50%, -50%);
            z-index: 200; pointer-events: none;
        }
        @keyframes radialPop { 0% { transform: translate(-50%,-50%) scale(0.5); opacity:0; } 100% { transform: translate(-50%,-50%) scale(1); opacity:1; } }
        #radial-menu:not(.hidden) { animation: radialPop 0.15s ease-out; }
        .radial-btn {
            position: absolute; width: 68px; height: 68px;
            border-radius: 50%; color: white; font-weight: 800;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 13px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.3);
            pointer-events: auto; -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s;
        }
        .radial-btn:active { transform: scale(0.88); }
        #rad-whole   { top: 0;    left: 96px;  background: linear-gradient(135deg, #9C27B0, #7B1FA2); }
        #rad-half    { top: 96px; right: 0;     background: linear-gradient(135deg, #42A5F5, #1E88E5); }
        #rad-quarter { bottom: 0; left: 96px;  background: linear-gradient(135deg, #FFA726, #FB8C00); }
        #rad-eighth  { top: 96px; left: 0;      background: linear-gradient(135deg, #26A69A, #00897B); }
        #rad-delete  { bottom: 0; left: 0;      background: linear-gradient(135deg, #EF5350, #E53935); }
        #rad-center  { top: 96px; left: 96px;   background: linear-gradient(135deg, #78909C, #546E7A); width: 68px; height: 68px; }
        .rad-symbol { font-size: 28px; line-height: 1; }
        .rad-label { font-size: 10px; opacity: 0.85; margin-top: 1px; }

        /* --- MODE TOGGLE --- */
        #mode-bar {
            flex: 0 0 auto; display: flex; justify-content: center; align-items: center;
            padding: 6px 16px; gap: 8px;
        }
        .mode-pill {
            padding: 8px 24px; border-radius: 20px; font-size: 14px; font-weight: 800;
            color: white; opacity: 0.7;
            background: rgba(255,255,255,0.15);
            transition: all 0.2s;
        }
        .mode-pill.active { opacity: 1; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        #toggle-letters.active { background: #00BCD4; }
        #toggle-piano.active { background: #AB47BC; }
        #toggle-labels {
            padding: 8px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
            background: rgba(255,255,255,0.15); color: white; opacity: 0.7;
        }

        /* --- BOTTOM INPUT ZONE --- */
        #bottom-zone {
            flex: 0 0 auto; display: flex; flex-direction: column;
            padding: 0 16px 14px 16px;
        }

        /* Letter Mode */
        #letter-mode { display: flex; gap: 8px; height: 90px; }
        #letter-buttons { display: flex; flex-grow: 1; gap: 6px; }
        .letter-btn {
            flex: 1; border-radius: 14px; font-size: 32px; font-weight: 900;
            background: white; color: #37474F;
            box-shadow: 0 4px 0 #CBD5E0, 0 2px 10px rgba(0,0,0,0.08);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.08s;
        }
        .letter-btn:active, .letter-btn.pressed {
            background: #00E5FF; color: white;
            transform: translateY(4px); box-shadow: 0 0 0 #CBD5E0;
        }

        /* Octave + Accidentals column */
        #right-controls {
            display: flex; flex-direction: column; gap: 4px; flex: 0 0 auto;
        }
        #octave-row {
            display: flex; align-items: center; gap: 4px; justify-content: center;
        }
        #octave-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.7); text-align: center; }
        .oct-btn {
            width: 52px; height: 40px; border-radius: 12px; font-size: 20px; font-weight: 800;
            background: white; color: #37474F;
            box-shadow: 0 3px 0 #CBD5E0;
            display: flex; align-items: center; justify-content: center;
        }
        .oct-btn:active { transform: translateY(3px); box-shadow: none; }
        #octave-display { font-size: 22px; font-weight: 900; color: white; width: 28px; text-align: center; }

        #accidental-row { display: flex; gap: 4px; justify-content: center; }
        .acc-btn {
            width: 40px; height: 36px; border-radius: 10px; font-size: 18px; font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.1s;
        }
        #btn-sharp   { background: #37474F; color: white; box-shadow: 0 3px 0 #263238; }
        #btn-natural { background: #CFD8DC; color: #455A64; box-shadow: 0 3px 0 #B0BEC5; }
        #btn-flat    { background: #5C6BC0; color: white; box-shadow: 0 3px 0 #3949AB; }
        .acc-btn:active { transform: translateY(3px); box-shadow: none; }
        .acc-btn.active { outline: 3px solid #FFD600; outline-offset: -2px; }

        /* Piano Mode */
        #piano-mode {
            display: flex; height: 90px; position: relative;
            background: #1A1A2E; padding: 5px; border-radius: 14px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.4);
        }
        .white-key {
            flex: 1; background: linear-gradient(to bottom, #FEFEFE 80%, #E8E8E8);
            margin: 1px; border: 1px solid #D5D5D5; border-radius: 0 0 10px 10px;
            position: relative;
            display: flex; align-items: flex-end; justify-content: center;
            padding-bottom: 6px; font-size: 10px; font-weight: 700; color: #AAA;
        }
        .black-key {
            position: absolute; width: 3.5%; height: 56%;
            background: linear-gradient(to bottom, #2A2A2A, #0A0A0A);
            border-radius: 0 0 5px 5px; z-index: 2; transform: translateX(-50%);
            display: flex; align-items: flex-end; justify-content: center;
            padding-bottom: 4px; color: #777; font-size: 8px; font-weight: 700;
            box-shadow: 0 3px 5px rgba(0,0,0,0.5);
        }
        .white-key:active { background: linear-gradient(to bottom, #E0F7FA 80%, #B2EBF2); }
        .black-key:active { background: linear-gradient(to bottom, #333, #1A1A1A); }
        .label-hidden .key-label { display: none; }

        /* --- NOTEBOOK OVERLAY --- */
        #notebook-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        @keyframes slideUp { 0% { transform: translateY(30px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        #notebook-container {
            width: 85%; max-width: 800px; height: 55vh; min-height: 280px;
            background: #FAFAF5; border-radius: 20px;
            display: flex; position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease-out;
        }
        #btn-close-notebook {
            position: absolute; top: -12px; right: -12px; width: 36px; height: 36px;
            border-radius: 50%; background: #EF5350; color: white; font-size: 18px;
            z-index: 10; box-shadow: 0 3px 8px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
        }
        .notebook-page { flex: 1; padding: 24px; display: flex; flex-direction: column; }
        .left-page { border-right: 1px solid #E0DCCE; }
        .notebook-page h2 { font-size: 20px; margin-bottom: 12px; color: #37474F; }
        .save-row { display: flex; gap: 8px; margin-top: 12px; }
        #save-name-input {
            flex-grow: 1; padding: 10px 14px; font-size: 16px; font-family: 'Nunito', sans-serif;
            border: 2px solid #CBD5E0; border-radius: 10px; user-select: text;
        }
        #save-name-input:focus { outline: none; border-color: #42A5F5; }
        #btn-do-save { background: #43A047; color: white; padding: 10px 20px; font-size: 16px; border-radius: 10px; }
        #load-list-container { flex-grow: 1; background: white; border: 2px solid #E0E6ED; border-radius: 10px; margin-bottom: 12px; overflow-y: auto; }
        #saved-songs-list { list-style: none; padding: 0; margin: 0; }
        #saved-songs-list li { padding: 14px 16px; border-bottom: 1px solid #F0F0F0; font-size: 16px; cursor: pointer; color: #37474F; }
        #saved-songs-list li.selected { background: #E3F2FD; color: #1565C0; font-weight: 800; }
        #btn-do-load { background: #1E88E5; color: white; padding: 12px; font-size: 16px; border-radius: 10px; }
        #btn-do-load:disabled { background: #CFD8DC; cursor: not-allowed; color: #90A4AE; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div id="header-bar">
        <div id="header-left">
            <div id="header-icon">&#9835;</div>
            <div id="header-text">
                <h1>MusicPad</h1>
                <span>Musical Notepad</span>
            </div>
        </div>
        <div id="header-actions">
            <button class="hdr-btn" id="btn-songs">My Songs</button>
            <button class="hdr-btn" id="btn-play-header">&#9654;</button>
            <button class="hdr-btn" id="btn-new">+</button>
        </div>
    </div>

    <!-- NOTATION CARD -->
    <div id="notation-area">
        <div id="vexflow-canvas"></div>
        <div id="notepad-strip">Tap notes to begin...</div>
    </div>

    <!-- RADIAL MENU -->
    <div id="radial-menu" class="hidden">
        <div class="radial-btn" id="rad-whole"><span class="rad-symbol">&#119133;</span><span class="rad-label">Whole</span></div>
        <div class="radial-btn" id="rad-half"><span class="rad-symbol">&#119134;</span><span class="rad-label">Half</span></div>
        <div class="radial-btn" id="rad-quarter"><span class="rad-symbol">&#9833;</span><span class="rad-label">Quarter</span></div>
        <div class="radial-btn" id="rad-eighth"><span class="rad-symbol">&#9834;</span><span class="rad-label">Eighth</span></div>
        <div class="radial-btn" id="rad-delete"><span class="rad-symbol">&#128465;</span><span class="rad-label">Delete</span></div>
        <div class="radial-btn" id="rad-center"><span class="rad-symbol">&#119137;</span><span class="rad-label">Rest</span></div>
    </div>

    <!-- MODE TOGGLE -->
    <div id="mode-bar">
        <button class="mode-pill" id="toggle-piano">Piano Mode</button>
        <button class="mode-pill active" id="toggle-letters">Letter Mode</button>
        <button id="toggle-labels">Labels</button>
    </div>

    <!-- INPUT ZONE -->
    <div id="bottom-zone">
        <div id="letter-mode">
            <div id="letter-buttons">
                <button class="letter-btn" data-note="C">C</button>
                <button class="letter-btn" data-note="D">D</button>
                <button class="letter-btn" data-note="E">E</button>
                <button class="letter-btn" data-note="F">F</button>
                <button class="letter-btn" data-note="G">G</button>
                <button class="letter-btn" data-note="A">A</button>
                <button class="letter-btn" data-note="B">B</button>
            </div>
            <div id="right-controls">
                <div id="octave-label">Octave</div>
                <div id="octave-row">
                    <button class="oct-btn" id="oct-up">&#8593;</button>
                    <div id="octave-display">4</div>
                    <button class="oct-btn" id="oct-down">&#8595;</button>
                </div>
                <div id="accidental-row">
                    <button class="acc-btn" id="btn-sharp">#</button>
                    <button class="acc-btn" id="btn-natural">&#9838;</button>
                    <button class="acc-btn" id="btn-flat">b</button>
                </div>
            </div>
        </div>
        <div id="piano-mode" class="hidden"></div>
    </div>

    <!-- NOTEBOOK OVERLAY -->
    <div id="notebook-overlay" class="hidden">
        <div id="notebook-container">
            <button id="btn-close-notebook">&#10005;</button>
            <div class="notebook-page left-page">
                <h2>Save Tune</h2>
                <p style="color:#666; font-size:14px;">Give your music a name:</p>
                <div class="save-row">
                    <input type="text" id="save-name-input" placeholder="My Song Name">
                    <button id="btn-do-save">Save</button>
                </div>
                <p id="save-message" class="hidden" style="color: #43A047; margin-top: 10px; font-weight: 800;">Saved!</p>
            </div>
            <div class="notebook-page right-page">
                <h2>Load Tune</h2>
                <div id="load-list-container">
                    <ul id="saved-songs-list"></ul>
                </div>
                <button id="btn-do-load" disabled>Load Selected</button>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW setup skipped for local testing.'));
            });
        }
    </script>

    <script>
        // --- 1. STATE & DOM ---
        let currentOctave = 4;
        let currentAccidental = '';
        let masterTune = [];

        const synth = new Tone.Synth({
            oscillator: { type: 'triangle8' },
            envelope: { attack: 0.005, decay: 0.3, sustain: 0.2, release: 1.2 }
        }).toDestination();
        const reverb = new Tone.Reverb({ decay: 1.5, wet: 0.2 }).toDestination();
        synth.connect(reverb);

        const notepadStrip = document.getElementById('notepad-strip');
        const viewLetterMode = document.getElementById('letter-mode');
        const viewPianoMode = document.getElementById('piano-mode');
        const octaveDisplay = document.getElementById('octave-display');

        // Toggle Views
        document.getElementById('toggle-letters').addEventListener('click', () => {
            viewLetterMode.classList.remove('hidden'); viewPianoMode.classList.add('hidden');
            document.getElementById('toggle-letters').classList.add('active');
            document.getElementById('toggle-piano').classList.remove('active');
        });
        document.getElementById('toggle-piano').addEventListener('click', () => {
            viewPianoMode.classList.remove('hidden'); viewLetterMode.classList.add('hidden');
            document.getElementById('toggle-piano').classList.add('active');
            document.getElementById('toggle-letters').classList.remove('active');
        });

        document.getElementById('toggle-labels').addEventListener('click', () => {
            viewPianoMode.classList.toggle('label-hidden');
        });

        // Octave
        document.getElementById('oct-up').addEventListener('click', () => { if(currentOctave < 6) { currentOctave++; octaveDisplay.textContent = currentOctave; } });
        document.getElementById('oct-down').addEventListener('click', () => { if(currentOctave > 2) { currentOctave--; octaveDisplay.textContent = currentOctave; } });

        // Accidentals
        document.getElementById('btn-sharp').addEventListener('click', () => setAccidental('#'));
        document.getElementById('btn-flat').addEventListener('click', () => setAccidental('b'));
        document.getElementById('btn-natural').addEventListener('click', () => setAccidental(''));

        function setAccidental(acc) {
            currentAccidental = acc;
            document.querySelectorAll('.acc-btn').forEach(b => b.classList.remove('active'));
            if (acc === '#') document.getElementById('btn-sharp').classList.add('active');
            else if (acc === 'b') document.getElementById('btn-flat').classList.add('active');
            else document.getElementById('btn-natural').classList.add('active');
        }
        setAccidental('');

        // Clear / New
        document.getElementById('btn-new').addEventListener('click', () => { masterTune = []; updateNotepad(); renderNotation(); });

        // --- 2. INPUT LOGIC ---
        function pushNote(pitchString, labelText) {
            masterTune.push({
                id: `note-${Date.now()}-${masterTune.length}`,
                pitch: pitchString, duration: "q", isRest: false, label: labelText
            });
            updateNotepad(); renderNotation();
        }

        function pitchToTone(pitchStr) {
            const parts = pitchStr.split('/');
            return parts[0].toUpperCase() + parts[1];
        }

        // Letter Buttons with press highlight
        document.querySelectorAll('.letter-btn').forEach(btn => {
            const handler = (e) => {
                e.preventDefault();
                const letter = btn.getAttribute('data-note');
                const fullNote = letter + currentAccidental;
                const vexPitch = `${fullNote.toLowerCase()}/${currentOctave}`;
                pushNote(vexPitch, fullNote);
                synth.triggerAttackRelease(pitchToTone(vexPitch), "8n");
                // Flash highlight
                btn.classList.add('pressed');
                setTimeout(() => btn.classList.remove('pressed'), 150);
            };
            btn.addEventListener('click', handler);
            btn.addEventListener('touchend', (e) => { e.preventDefault(); handler(e); });
        });

        function updateNotepad() {
            const text = masterTune.map(n => {
                if (n.isRest) return '(Rest)';
                return `${n.label}${n.pitch.split('/')[1]}`;
            }).join('  ');
            notepadStrip.textContent = text || 'Tap notes to begin...';
            notepadStrip.scrollLeft = notepadStrip.scrollWidth;
        }

        // --- 3. PIANO GENERATOR ---
        const notesOrder = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        function buildKeyboard(startNote, endNote) {
            const container = document.getElementById('piano-mode');
            container.innerHTML = '';
            const startMidi = notesOrder.indexOf(startNote.pitch) + (startNote.octave * 12);
            const endMidi = notesOrder.indexOf(endNote.pitch) + (endNote.octave * 12);

            let totalWhiteKeys = 0;
            for (let i = startMidi; i <= endMidi; i++) {
                if (!notesOrder[i % 12].includes('#')) totalWhiteKeys++;
            }

            let whiteKeyIndex = 0;
            for (let i = startMidi; i <= endMidi; i++) {
                const noteName = notesOrder[i % 12];
                const octave = Math.floor(i / 12);
                const isBlack = noteName.includes('#');

                const key = document.createElement('div');
                key.className = isBlack ? 'black-key' : 'white-key';

                const label = document.createElement('span');
                label.className = 'key-label';
                label.textContent = `${noteName}${octave}`;
                key.appendChild(label);

                if (isBlack) {
                    key.style.left = `${(whiteKeyIndex / totalWhiteKeys) * 100}%`;
                    container.appendChild(key);
                } else {
                    container.appendChild(key);
                    whiteKeyIndex++;
                }

                const keyHandler = (e) => {
                    e.preventDefault();
                    const vexPitch = `${noteName.toLowerCase()}/${octave}`;
                    pushNote(vexPitch, noteName);
                    synth.triggerAttackRelease(pitchToTone(vexPitch), "8n");
                };
                key.addEventListener('mousedown', keyHandler);
                key.addEventListener('touchstart', (e) => { e.preventDefault(); keyHandler(e); });
            }
        }
        buildKeyboard({pitch: 'C', octave: 3}, {pitch: 'C', octave: 6});

        // --- 4. VEXFLOW ENGINE ---
        const VF = Vex.Flow;
        const canvasDiv = document.getElementById("vexflow-canvas");
        const renderer = new VF.Renderer(canvasDiv, VF.Renderer.Backends.SVG);

        function getCanvasWidth() { return Math.max(canvasDiv.clientWidth, 600); }

        function renderNotation() {
            const width = getCanvasWidth();
            const minWidth = Math.max(width, masterTune.length * 50 + 100);
            renderer.resize(minWidth, 190);
            const context = renderer.getContext();
            context.clear();

            const topStaff = new VF.Stave(10, 2, minWidth - 30).addClef("treble");
            const bottomStaff = new VF.Stave(10, 95, minWidth - 30).addClef("bass");

            topStaff.setContext(context).draw();
            bottomStaff.setContext(context).draw();
            new VF.StaveConnector(topStaff, bottomStaff).setType(VF.StaveConnector.type.BRACE).setContext(context).draw();
            new VF.StaveConnector(topStaff, bottomStaff).setType(VF.StaveConnector.type.SINGLE_LEFT).setContext(context).draw();

            if (masterTune.length === 0) return;

            let trebleNotes = [], bassNotes = [];

            masterTune.forEach(n => {
                const octave = parseInt(n.pitch.split('/')[1]);
                const isBass = octave < 4;

                let vfNote = new VF.StaveNote({
                    keys: [n.pitch],
                    duration: n.duration + (n.isRest ? "r" : ""),
                    clef: isBass ? "bass" : "treble"
                });

                const notePart = n.pitch.split('/')[0];
                if (notePart.includes('#')) vfNote.addModifier(new VF.Accidental('#'), 0);
                else if (notePart.includes('b') && notePart.length > 1) vfNote.addModifier(new VF.Accidental('b'), 0);

                if (!n.isRest) vfNote.addModifier(new VF.Annotation(n.label).setVerticalJustification(VF.Annotation.VerticalJustify.BOTTOM), 0);
                vfNote.setAttribute("id", n.id);

                let ghostRest = new VF.StaveNote({
                    keys: [isBass ? "b/4" : "d/3"],
                    duration: n.duration + "r",
                    clef: isBass ? "treble" : "bass"
                });
                ghostRest.setStyle({ fillStyle: "transparent", strokeStyle: "transparent" });

                if (isBass) { bassNotes.push(vfNote); trebleNotes.push(ghostRest); }
                else { trebleNotes.push(vfNote); bassNotes.push(ghostRest); }
            });

            const trebleVoice = new VF.Voice({ num_beats: 1000, beat_value: 4 }).setStrict(false).addTickables(trebleNotes);
            const bassVoice = new VF.Voice({ num_beats: 1000, beat_value: 4 }).setStrict(false).addTickables(bassNotes);

            new VF.Formatter().joinVoices([trebleVoice, bassVoice]).format([trebleVoice, bassVoice], minWidth - 100);
            trebleVoice.draw(context, topStaff);
            bassVoice.draw(context, bottomStaff);

            canvasDiv.scrollLeft = canvasDiv.scrollWidth;
        }
        renderNotation();
        window.addEventListener('resize', () => renderNotation());

        // --- 5. RADIAL MENU ---
        const radialMenu = document.getElementById('radial-menu');
        let selectedNoteId = null;

        function findNoteId(el) {
            while (el && el !== canvasDiv) {
                const id = el.getAttribute('id');
                if (id && id.startsWith('note-')) return id;
                const classes = el.getAttribute('class') || '';
                if (classes.includes('vf-stavenote')) {
                    const innerEl = el.querySelector('[id^="note-"]');
                    if (innerEl) return innerEl.getAttribute('id');
                }
                el = el.parentElement;
            }
            return null;
        }

        function findNearestNote(clientX) {
            const svgEl = canvasDiv.querySelector('svg');
            if (!svgEl) return null;
            const noteEls = svgEl.querySelectorAll('[id^="note-"]');
            let closest = null, closestDist = 40;
            noteEls.forEach(el => {
                const rect = el.getBoundingClientRect();
                const dist = Math.abs(clientX - (rect.left + rect.width / 2));
                if (dist < closestDist) { closestDist = dist; closest = el; }
            });
            return closest ? closest.getAttribute('id') : null;
        }

        const handleCanvasTap = (e) => {
            if (e.target.closest('#radial-menu')) return;
            const clientX = e.clientX ?? e.changedTouches?.[0]?.clientX ?? 0;
            const clientY = e.clientY ?? e.changedTouches?.[0]?.clientY ?? 0;
            let noteId = findNoteId(e.target) || findNearestNote(clientX);
            if (noteId) {
                e.preventDefault(); e.stopPropagation();
                selectedNoteId = noteId;
                radialMenu.style.left = clientX + 'px';
                radialMenu.style.top = clientY + 'px';
                radialMenu.classList.remove('hidden');
            } else {
                radialMenu.classList.add('hidden');
                selectedNoteId = null;
            }
        };
        canvasDiv.addEventListener('click', handleCanvasTap);
        canvasDiv.addEventListener('touchend', (e) => { handleCanvasTap(e); });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#radial-menu') && !e.target.closest('#vexflow-canvas')) {
                radialMenu.classList.add('hidden'); selectedNoteId = null;
            }
        });

        const updateData = (modFunc) => {
            if (!selectedNoteId) return;
            const idx = masterTune.findIndex(n => n.id === selectedNoteId);
            if (idx !== -1) modFunc(idx);
            renderNotation(); updateNotepad();
            radialMenu.classList.add('hidden'); selectedNoteId = null;
        };

        const addRadialHandler = (id, fn) => {
            const el = document.getElementById(id);
            el.addEventListener('click', (e) => { e.stopPropagation(); fn(); });
            el.addEventListener('touchend', (e) => { e.preventDefault(); e.stopPropagation(); fn(); });
        };

        addRadialHandler('rad-whole', () => updateData(i => masterTune[i].duration = 'w'));
        addRadialHandler('rad-half', () => updateData(i => masterTune[i].duration = 'h'));
        addRadialHandler('rad-quarter', () => updateData(i => masterTune[i].duration = 'q'));
        addRadialHandler('rad-eighth', () => updateData(i => masterTune[i].duration = '8'));
        addRadialHandler('rad-center', () => updateData(i => masterTune[i].isRest = !masterTune[i].isRest));
        addRadialHandler('rad-delete', () => {
            if (!selectedNoteId) return;
            const idx = masterTune.findIndex(n => n.id === selectedNoteId);
            if (idx !== -1) masterTune.splice(idx, 1);
            renderNotation(); updateNotepad();
            radialMenu.classList.add('hidden'); selectedNoteId = null;
        });

        // --- 6. TONE.JS AUDIO ---
        document.getElementById('btn-play-header').addEventListener('click', async () => {
            await Tone.start();
            if (masterTune.length === 0) return;
            let timeAcc = Tone.now() + 0.1;
            masterTune.forEach(n => {
                let dur = "4n", timeAdd = 0.5;
                if(n.duration==='w'){ dur="1n"; timeAdd=2.0;}
                if(n.duration==='h'){ dur="2n"; timeAdd=1.0;}
                if(n.duration==='8'){ dur="8n"; timeAdd=0.25;}
                if (!n.isRest) synth.triggerAttackRelease(pitchToTone(n.pitch), dur, timeAcc);
                timeAcc += timeAdd;
            });
        });

        // --- 7. NOTEBOOK (SAVE/LOAD) ---
        const overlay = document.getElementById('notebook-overlay');
        const songList = document.getElementById('saved-songs-list');
        const saveMsg = document.getElementById('save-message');
        const loadBtn = document.getElementById('btn-do-load');
        let selectedSong = null;

        document.getElementById('btn-songs').addEventListener('click', () => { refreshList(); overlay.classList.remove('hidden'); });
        document.getElementById('btn-close-notebook').addEventListener('click', () => { overlay.classList.add('hidden'); saveMsg.classList.add('hidden'); });

        document.getElementById('btn-do-save').addEventListener('click', () => {
            const name = document.getElementById('save-name-input').value.trim();
            if (!name) return;
            localStorage.setItem('MusicPad_' + name, JSON.stringify(masterTune));
            saveMsg.classList.remove('hidden');
            setTimeout(() => saveMsg.classList.add('hidden'), 2000);
            refreshList();
        });

        function refreshList() {
            songList.innerHTML = ''; selectedSong = null; loadBtn.disabled = true;
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('MusicPad_')) {
                    const li = document.createElement('li');
                    li.textContent = key.replace('MusicPad_', '');
                    li.addEventListener('click', () => {
                        document.querySelectorAll('#saved-songs-list li').forEach(el => el.classList.remove('selected'));
                        li.classList.add('selected');
                        selectedSong = key; loadBtn.disabled = false;
                    });
                    songList.appendChild(li);
                }
            }
        }

        loadBtn.addEventListener('click', () => {
            if (!selectedSong) return;
            masterTune = JSON.parse(localStorage.getItem(selectedSong));
            updateNotepad(); renderNotation();
            overlay.classList.add('hidden');
        });
    </script>
</body>
</html>
